<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Float and Clear</title>
    <style>
        .cards{
            border: 2px solid black;
            display: flow-root;
        }
        img{
            float: left;
        }
        .card{
            border: 2px solid red;
        }
        .card:nth-child(2){
            background-color: teal;
            clear: left;
        }
    </style>
</head>
<body>
    <div class="cards">
        <img src="" alt="not available" width="230px">
        <div class="card"><p>
            Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nobis, ipsa. Molestias facilis id est quis quidem, ab inventore? Voluptatem esse impedit eum distinctio adipisci debitis, veniam eaque dolore quibusdam neque fuga facere, ratione voluptas!
        </p></div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </div>
</body>
</html>
